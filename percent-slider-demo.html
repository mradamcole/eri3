<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Percent slider — knob variants demo</title>
    <link rel="stylesheet" href="percent-slider.css" />
    <style>
      body {
        margin: 0;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        background: #f1f5f9;
        color: #0f172a;
      }

      .demo {
        max-width: 54rem;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0 0 1rem;
        color: #334155;
      }

      .demo__grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fit, minmax(16rem, 1fr));
      }

      .demo__panel {
        background: #fff;
        border: 1px solid #d9e0ea;
        border-radius: 10px;
        padding: 1rem;
      }

      .demo__controls {
        display: grid;
        gap: 0.65rem;
      }

      .demo__field {
        display: grid;
        gap: 0.25rem;
        font-size: 0.875rem;
      }

      .demo__field input,
      .demo__field select,
      .demo__field textarea {
        font: inherit;
        padding: 0.35rem 0.5rem;
        border: 1px solid #c9d3e0;
        border-radius: 6px;
        background: #fff;
      }

      .demo__field textarea {
        min-height: 5rem;
        resize: vertical;
      }

      .demo__hint {
        margin: 0;
        font-size: 0.75rem;
        color: #475569;
      }

      .demo__check {
        display: flex;
        gap: 0.45rem;
        align-items: center;
        font-size: 0.875rem;
      }

      .demo__slider-wrap {
        margin-top: 0.75rem;
      }

      #out {
        margin: 0;
        padding: 0.75rem;
        font-size: 0.78rem;
        background: #0f172a;
        color: #e2e8f0;
        border-radius: 8px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <main class="demo">
      <h1>Percent slider knob variants</h1>
      <p>
        Adjust the controls and test drag, keyboard arrows, Home/End, and manual
        value input.
      </p>

      <div class="demo__grid">
        <section class="demo__panel">
          <form class="demo__controls" id="controlsForm">
            <label class="demo__field">
              Mode
              <select id="cfgMode">
                <option value="single" selected>single</option>
                <option value="range">range (min + max)</option>
              </select>
            </label>
            <label class="demo__field">
              Min
              <input id="cfgMin" type="number" value="0" />
            </label>
            <label class="demo__field">
              Max
              <input id="cfgMax" type="number" value="100" />
            </label>
            <label class="demo__field">
              Step
              <input id="cfgStep" type="number" value="5" min="1" />
            </label>
            <label class="demo__field">
              Value (single mode)
              <input id="cfgValue" type="number" value="45" />
            </label>
            <label class="demo__field">
              Value min (range mode)
              <input id="cfgValueMin" type="number" value="20" />
            </label>
            <label class="demo__field">
              Value max (range mode)
              <input id="cfgValueMax" type="number" value="70" />
            </label>
            <label class="demo__field">
              Fill color
              <input id="cfgColor" type="color" value="#8b0000" />
            </label>
            <label class="demo__field">
              Knob style
              <select id="cfgStyle">
                <option value="as-is">as-is</option>
                <option value="simple-circle">simple circle</option>
                <option value="grip-box">grip box</option>
                <option value="depressed-circle" selected>
                  depressed circle (default)
                </option>
                <option value="house">house</option>
              </select>
            </label>
            <label class="demo__field">
              Track style
              <select id="cfgTrackStyle">
                <option value="standard" selected>standard</option>
                <option value="depressed">depressed</option>
              </select>
            </label>
            <label class="demo__field">
              Tick position
              <select id="cfgTicksPos">
                <option value="none" selected>none</option>
                <option value="above">above rail</option>
                <option value="below">below rail</option>
              </select>
            </label>
            <label class="demo__field">
              Minor tick interval (%)
              <input id="cfgTickMinor" type="number" value="5" min="0" />
            </label>
            <label class="demo__field">
              Major tick interval (%)
              <input id="cfgTickMajor" type="number" value="10" min="0" />
            </label>
            <label class="demo__field">
              Snap mode
              <select id="cfgSnapMode">
                <option value="increment" selected>increment</option>
                <option value="none">none</option>
                <option value="minor">minor ticks</option>
                <option value="major">major ticks</option>
                <option value="custom">custom ticks</option>
              </select>
            </label>
            <label class="demo__field">
              Custom label size (CSS)
              <input id="cfgTickLabelSize" type="text" value="0.62rem" />
            </label>
            <label class="demo__field">
              Custom label rotation (deg)
              <input id="cfgTickLabelRotate" type="number" value="0" />
            </label>
            <label class="demo__field">
              Custom ticks JSON (value 0..1)
              <textarea id="cfgTickCustom">[
  { "value": 0, "label": "no THC" },
  { "value": 0.1, "label": "low recreational" },
  { "value": 0.3, "label": "clinical" },
  { "value": 0.6, "label": "high recreational" }
]</textarea>
            </label>
            <p class="demo__hint" id="cfgTickCustomFeedback">
              JSON valid. Custom ticks will render.
            </p>
            <label class="demo__check">
              <input id="cfgFillEnabled" type="checkbox" checked />
              Fill left side of knob
            </label>
          </form>
        </section>

        <section class="demo__panel">
          <div class="demo__slider-wrap" id="sliderMount"></div>
          <p style="margin: 1rem 0 0.5rem; font-size: 0.8125rem">
            <strong>percent-slider-change</strong> payload:
          </p>
          <pre id="out">{ "value": 45 }</pre>
        </section>
      </div>
    </main>

    <script src="percent-slider.js"></script>
    <script>
      (function () {
        var form = document.getElementById("controlsForm");
        var mount = document.getElementById("sliderMount");
        var out = document.getElementById("out");
        var tickFeedback = document.getElementById("cfgTickCustomFeedback");
        if (!form || !mount || !out || !tickFeedback || !window.initPercentSliders) {
          return;
        }

        function getState() {
          var mode = document.getElementById("cfgMode").value;
          var min = Number(document.getElementById("cfgMin").value);
          var max = Number(document.getElementById("cfgMax").value);
          var step = Number(document.getElementById("cfgStep").value);
          var value = Number(document.getElementById("cfgValue").value);
          var valueMin = Number(document.getElementById("cfgValueMin").value);
          var valueMax = Number(document.getElementById("cfgValueMax").value);
          var fillEnabled = document.getElementById("cfgFillEnabled").checked;
          var fillColor = document.getElementById("cfgColor").value;
          var trackStyle = document.getElementById("cfgTrackStyle").value;
          var ticksPos = document.getElementById("cfgTicksPos").value;
          var tickMinor = Number(document.getElementById("cfgTickMinor").value);
          var tickMajor = Number(document.getElementById("cfgTickMajor").value);
          var snapMode = document.getElementById("cfgSnapMode").value;
          var tickLabelSize = document.getElementById("cfgTickLabelSize").value.trim();
          var tickLabelRotate = Number(
            document.getElementById("cfgTickLabelRotate").value
          );
          var tickCustomRaw = document.getElementById("cfgTickCustom").value.trim();
          var knobStyle = document.getElementById("cfgStyle").value;
          var tickCustom = [];
          var tickCustomValid = true;
          var tickCustomError = "";
          if (tickCustomRaw) {
            try {
              var parsed = JSON.parse(tickCustomRaw);
              if (!Array.isArray(parsed)) {
                tickCustomValid = false;
                tickCustomError = "JSON must be an array.";
              } else {
                tickCustom = parsed;
              }
            } catch (e) {
              tickCustomValid = false;
              tickCustomError = "Invalid JSON.";
            }
          }
          return {
            mode: mode || "single",
            min: Number.isFinite(min) ? min : 0,
            max: Number.isFinite(max) ? max : 100,
            step: Number.isFinite(step) ? step : 5,
            value: Number.isFinite(value) ? value : 0,
            valueMin: Number.isFinite(valueMin) ? valueMin : 0,
            valueMax: Number.isFinite(valueMax) ? valueMax : 100,
            fillEnabled: fillEnabled,
            fillColor: fillColor || "#8b0000",
            trackStyle: trackStyle || "standard",
            ticksPos: ticksPos || "none",
            tickMinor: Number.isFinite(tickMinor) ? tickMinor : 0,
            tickMajor: Number.isFinite(tickMajor) ? tickMajor : 0,
            snapMode: snapMode || "increment",
            tickLabelSize: tickLabelSize || "0.62rem",
            tickLabelRotate: Number.isFinite(tickLabelRotate) ? tickLabelRotate : 0,
            tickCustomJson: tickCustomValid ? JSON.stringify(tickCustom) : "[]",
            tickCustomValid: tickCustomValid,
            tickCustomError: tickCustomError,
            knobStyle: knobStyle || "depressed-circle",
          };
        }

        function renderSlider() {
          var s = getState();
          var isRange = s.mode === "range";
          if (s.max <= s.min) {
            s.max = s.min + 1;
          }
          if (s.step <= 0) {
            s.step = 1;
          }
          if (s.valueMin < s.min) {
            s.valueMin = s.min;
          }
          if (s.valueMax > s.max) {
            s.valueMax = s.max;
          }
          if (s.valueMin > s.valueMax) {
            s.valueMin = s.valueMax;
          }
          if (s.tickMinor < 0) {
            s.tickMinor = 0;
          }
          if (s.tickMajor < 0) {
            s.tickMajor = 0;
          }
          if (!s.tickCustomValid) {
            tickFeedback.textContent =
              s.tickCustomError + " Using [] for render.";
            tickFeedback.style.color = "#b91c1c";
          } else {
            tickFeedback.textContent = "JSON valid. Custom ticks will render.";
            tickFeedback.style.color = "#166534";
          }

          var knobMarkup = isRange
            ? '<div class="percent-slider__knob" data-slider-knob-min><span class="percent-slider__knob-inner" aria-hidden="true"></span></div>' +
              '<div class="percent-slider__knob" data-slider-knob-max><span class="percent-slider__knob-inner" aria-hidden="true"></span></div>'
            : '<div class="percent-slider__knob" data-slider-knob><span class="percent-slider__knob-inner" aria-hidden="true"></span></div>';

          var fieldMarkup = isRange
            ? '<div class="percent-slider__field percent-slider__field--range">' +
              '<div class="percent-slider__bound">' +
              '<span class="percent-slider__bound-label">Min</span>' +
              '<input type="number" class="percent-slider__input percent-slider__input--bound" data-slider-input-min aria-label="Minimum value" />' +
              '<span class="percent-slider__suffix">%</span>' +
              "</div>" +
              '<div class="percent-slider__bound">' +
              '<span class="percent-slider__bound-label">Max</span>' +
              '<input type="number" class="percent-slider__input percent-slider__input--bound" data-slider-input-max aria-label="Maximum value" />' +
              '<span class="percent-slider__suffix">%</span>' +
              "</div>" +
              "</div>"
            : '<div class="percent-slider__field">' +
              '<input type="number" class="percent-slider__input" data-slider-input aria-labelledby="demoSliderLabel" />' +
              '<span class="percent-slider__suffix">%</span>' +
              "</div>";

          mount.innerHTML =
            '<div class="percent-slider-block" role="group" aria-labelledby="demoSliderLabel">' +
            '<span class="percent-slider-block__label" id="demoSliderLabel">Live slider demo (' +
            (isRange ? "range" : "single") +
            ')</span>' +
            '<div class="percent-slider" aria-labelledby="demoSliderLabel" data-min="' +
            s.min +
            '" data-max="' +
            s.max +
            '" data-step="' +
            s.step +
            '" data-range="' +
            (isRange ? "true" : "false") +
            '" data-fill="' +
            (s.fillEnabled ? "true" : "false") +
            '" data-fill-color="' +
            s.fillColor +
            '" data-track-style="' +
            s.trackStyle +
            '" data-ticks="' +
            s.ticksPos +
            '" data-tick-minor="' +
            s.tickMinor +
            '" data-tick-major="' +
            s.tickMajor +
            '" data-snap="' +
            s.snapMode +
            '" data-tick-label-size="' +
            s.tickLabelSize +
            '" data-tick-label-rotate="' +
            s.tickLabelRotate +
            '" data-knob-style="' +
            s.knobStyle +
            '" data-value="' +
            s.value +
            '" data-value-min="' +
            s.valueMin +
            '" data-value-max="' +
            s.valueMax +
            '">' +
            '<div class="percent-slider__row">' +
            '<div class="percent-slider__track-area">' +
            '<div class="percent-slider__track" data-slider-track>' +
            '<div class="percent-slider__fill" data-slider-fill></div>' +
            "</div>" +
            knobMarkup +
            "</div>" +
            fieldMarkup +
            "</div>" +
            "</div>" +
            "</div>";

          var sliderConfigNode = mount.querySelector(".percent-slider");
          if (sliderConfigNode) {
            sliderConfigNode.setAttribute("data-tick-custom", s.tickCustomJson);
          }

          window.initPercentSliders(mount);
          var slider = mount.querySelector(".percent-slider");
          if (!slider) {
            return;
          }
          slider.addEventListener("percent-slider-change", function (ev) {
            out.textContent = JSON.stringify(ev.detail, null, 2);
            if (isRange) {
              document.getElementById("cfgValueMin").value = String(ev.detail.min);
              document.getElementById("cfgValueMax").value = String(ev.detail.max);
            } else {
              document.getElementById("cfgValue").value = String(ev.detail.value);
            }
          });
          if (slider.percentSlider) {
            out.textContent = JSON.stringify(slider.percentSlider.getValue(), null, 2);
          }
        }

        form.addEventListener("input", renderSlider);
        form.addEventListener("change", renderSlider);
        renderSlider();
      })();
    </script>
  </body>
</html>
